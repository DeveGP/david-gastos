<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gastos">
  <title>Gastos · David</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --border: #2a2a2d;
      --text-primary: #f0ece4;
      --text-secondary: #7a7672;
      --accent: #c8a96e;
      --accent-dim: #c8a96e22;
      --success: #4caf7d;
      --error: #e05c5c;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
      padding-top: env(safe-area-inset-top, 24px);
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }

    .header-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.15;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
      font-weight: 300;
    }

    /* Input card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .input-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: block;
    }

    .input-field {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text-primary);
      resize: none;
      min-height: 110px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-appearance: none;
    }

    .input-field::placeholder {
      color: #3a3a3d;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* Examples */
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .example-chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    .example-chip:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Button */
    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 18px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #0e0e0f;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(14,14,15,0.3);
      border-top-color: #0e0e0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-spinner { display: block; }

    /* Feedback */
    .feedback {
      margin-top: 16px;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 400;
      display: none;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
    }

    .feedback.success {
      display: flex;
      background: #4caf7d18;
      border: 1px solid #4caf7d40;
      color: var(--success);
    }

    .feedback.error {
      display: flex;
      background: #e05c5c18;
      border: 1px solid #e05c5c40;
      color: var(--error);
    }

    .feedback-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      margin-top: 36px;
      text-align: center;
      font-size: 11px;
      color: #2e2e31;
      letter-spacing: 0.08em;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    /* History */
    .history {
      margin-top: 28px;
      animation: fadeUp 0.6s ease 0.25s both;
    }

    .history-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .history-time {
      font-size: 11px;
      color: #3a3a3d;
      flex-shrink: 0;
      margin-left: 10px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-label">Finanzas personales</div>
    <div class="header-title">Registrar<br>un gasto</div>
    <div class="header-sub">Escribe en lenguaje natural</div>
  </div>

  <div class="card">
    <label class="input-label" for="gasto-input">Descripción</label>
    <textarea
      id="gasto-input"
      class="input-field"
      placeholder="Café, 5 EUR&#10;Gasolina Podocat, 60 EUR&#10;Nomina Kembet, 1827 EUR (Hipoteca)"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    ></textarea>

    <div class="examples">
      <button class="example-chip" onclick="setExample('Supermercado, EUR')">🛒 Super</button>
      <button class="example-chip" onclick="setExample('Restaurante, EUR')">🍽 Restaurante</button>
      <button class="example-chip" onclick="setExample('Take Away, EUR')">🥡 Take Away</button>
      <button class="example-chip" onclick="setExample('Gastos varios, EUR')">📦 Gastos varios</button>
      <button class="example-chip" onclick="setExample('Ocio, EUR')">🎭 Ocio</button>
      <button class="example-chip" onclick="clearAndFocus()">✏️ Otro</button>
    </div>
  </div>

  <button class="btn" id="send-btn" onclick="enviarGasto()">
    <div class="btn-inner">
      <div class="btn-spinner"></div>
      <span class="btn-text">Registrar gasto</span>
    </div>
  </button>

  <div class="feedback" id="feedback">
    <span class="feedback-icon" id="feedback-icon"></span>
    <span id="feedback-text"></span>
  </div>

  <div class="history" id="history-section" style="display:none">
    <div class="history-label">Últimos registros</div>
    <div class="history-list" id="history-list"></div>
  </div>

  <div class="footer">davidgarcia · gastos</div>

</div>

<script>
  const WEBHOOK_URL = 'https://devegp.app.n8n.cloud/webhook/988ac9dc-924b-4baf-946e-ea6770ceb8d6';
  const history = [];

  function setExample(text) {
    const input = document.getElementById('gasto-input');
    input.value = text;
    input.focus();
    // Position cursor between ", " and "EUR" so David only types the number
    const pos = text.indexOf('EUR');
    if (pos !== -1) {
      setTimeout(() => input.setSelectionRange(pos, pos), 10);
    }
  }

  function clearAndFocus() {
    const input = document.getElementById('gasto-input');
    input.value = '';
    input.focus();
  }

  function showFeedback(type, text) {
    const fb = document.getElementById('feedback');
    const icon = document.getElementById('feedback-icon');
    const msg = document.getElementById('feedback-text');

    fb.className = 'feedback ' + type;
    icon.textContent = type === 'success' ? '✓' : '✕';
    msg.textContent = text;

    if (type === 'success') {
      setTimeout(() => { fb.style.display = 'none'; }, 4000);
    }
  }

  function addToHistory(text) {
    const now = new Date();
    const time = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    history.unshift({ text, time });
    if (history.length > 5) history.pop();

    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');

    section.style.display = 'block';
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <span class="history-text">${h.text}</span>
        <span class="history-time">${h.time}</span>
      </div>
    `).join('');
  }

  async function enviarGasto() {
    const input = document.getElementById('gasto-input');
    const btn = document.getElementById('send-btn');
    const texto = input.value.trim();

    if (!texto) {
      input.focus();
      input.style.borderColor = 'var(--error)';
      setTimeout(() => { input.style.borderColor = ''; }, 1500);
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ texto })
      });

      if (response.ok) {
        showFeedback('success', 'Gasto registrado correctamente');
        addToHistory(texto);
        input.value = '';
        // Haptic feedback on iOS
        if (navigator.vibrate) navigator.vibrate(40);
      } else {
        showFeedback('error', `Error del servidor (${response.status}). Inténtalo de nuevo.`);
      }
    } catch (err) {
      showFeedback('error', 'Sin conexión. Comprueba tu red e inténtalo de nuevo.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // Submit with Enter key (desktop)
  document.getElementById('gasto-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.metaKey) enviarGasto();
  });
</script>

</body>
</html>
