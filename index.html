<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finanzas · David</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#faf7f2;--card:#fff;--text:#1a1612;--sub:rgba(26,22,18,0.5);
--gold:#a07838;--gold-light:rgba(160,120,56,0.08);--gold-border:rgba(160,120,56,0.12);
--green:#2d7a52;--green-bg:rgba(45,122,82,0.06);--red:#a03030;--red-bg:rgba(160,48,48,0.05);
--radius:16px;--radius-sm:10px;--shadow:0 1px 3px rgba(26,22,18,0.04),0 4px 12px rgba(26,22,18,0.03);
--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--gold-border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 8px;text-align:center;background:none;border:none;font-family:var(--font-body);font-size:10px;color:var(--sub);cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--gold)}
.nav-btn svg{display:block;margin:0 auto 3px;width:22px;height:22px}
.nav-btn.active svg{stroke:var(--gold)}

/* PAGES */
.page{display:none;padding:20px 0}
.page.active{display:block}
.page-title{font-family:var(--font-display);font-size:28px;font-weight:600;padding:12px 24px 4px;letter-spacing:-0.3px}
.page-sub{font-size:13px;color:var(--sub);padding:0 24px 20px;font-weight:300}

/* REGISTRO */
.input-wrap{padding:0 20px;margin-bottom:16px}
.msg-input{width:100%;padding:16px 18px;border:1.5px solid var(--gold-border);border-radius:var(--radius);font-family:var(--font-body);font-size:15px;background:var(--card);color:var(--text);outline:none;transition:border-color .2s}
.msg-input:focus{border-color:var(--gold)}
.chips{display:flex;gap:8px;padding:0 20px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:8px 16px;border-radius:20px;border:1px solid var(--gold-border);background:var(--card);font-size:13px;color:var(--text);cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.chip.active,.chip:active{background:var(--gold);color:#fff;border-color:var(--gold)}
.send-wrap{padding:0 20px;margin-bottom:20px}
.send-btn{width:100%;padding:14px;border-radius:var(--radius);background:var(--gold);color:#fff;font-size:15px;font-weight:500;border:none;cursor:pointer;font-family:var(--font-body);letter-spacing:0.3px;transition:opacity .2s}
.send-btn:active{opacity:.85}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.feedback{padding:0 20px;font-size:13px;min-height:20px;transition:opacity .3s;opacity:0}
.feedback.ok{opacity:1;color:var(--green)}.feedback.err{opacity:1;color:var(--red)}
.section-label{font-family:var(--font-display);font-size:18px;font-weight:600;padding:24px 24px 10px;letter-spacing:-0.2px}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--gold-border)}
.hi-text{flex:1;font-size:13px;color:var(--text);margin-right:10px;word-break:break-word}
.hi-badge{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500;flex-shrink:0}
.hi-badge.ok{background:var(--green-bg);color:var(--green)}
.hi-badge.err{background:var(--red-bg);color:var(--red)}

/* DASHBOARD */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px 16px}
.month-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold-border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer}
.month-btn svg{width:16px;height:16px;stroke:var(--gold)}
.month-display{font-family:var(--font-display);font-size:20px;font-weight:600}
.balance-hero{text-align:center;padding:24px 20px 20px;margin:0 20px 16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
.blabel{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.bamount{font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:-1px}
.bamount.pos{color:var(--green)}.bamount.neg{color:var(--red)}.bamount.zero{color:var(--text)}
.bsub{font-size:12px;color:var(--sub);margin-top:2px}
.ahorro-pill{display:inline-block;margin-top:10px;padding:4px 14px;border-radius:20px;background:var(--green-bg);color:var(--green);font-size:12px;font-weight:500}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;margin-bottom:16px}
.kpi-tile{padding:16px;border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow)}
.kpi-label{font-size:12px;color:var(--sub);margin-bottom:4px}
.kpi-val{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-0.5px}
.kpi-tile.in .kpi-val{color:var(--green)}.kpi-tile.out .kpi-val{color:var(--red)}
.kpi-count{font-size:11px;color:var(--sub);margin-top:2px}

.evol-wrap{margin:16px 20px;padding:16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
.evol-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:12px}
.chart-wrap{margin:16px 20px;padding:16px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
.chart-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin-bottom:12px}

.cat-row{display:flex;align-items:center;gap:8px;padding:8px 20px}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:13px;width:100px;flex-shrink:0}
.cat-bar-wrap{flex:1;height:6px;background:var(--gold-light);border-radius:3px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.cat-amount{font-size:13px;font-weight:500;width:80px;text-align:right;flex-shrink:0}

/* SEMÁFORO */
.semaforo-list{padding:0 20px;margin-bottom:20px}
.semaforo-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gold-border)}
.semaforo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.semaforo-dot.verde{background:#2d7a52}.semaforo-dot.rojo{background:#a03030}.semaforo-dot.igual{background:#a07838}
.semaforo-name{font-size:13px;flex:1}
.semaforo-vals{text-align:right}
.semaforo-actual{font-size:13px;font-weight:500}
.semaforo-diff{font-size:11px}
.semaforo-diff.verde{color:#2d7a52}.semaforo-diff.rojo{color:#a03030}.semaforo-diff.igual{color:var(--sub)}

/* HUCHAS */
.principal-banner{display:flex;justify-content:space-between;align-items:center;margin:0 20px 16px;padding:20px;background:linear-gradient(135deg,#1a1612,#2a2218);border-radius:var(--radius);color:#f5f0e8}
.plabel{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:1px}
.pname{font-family:var(--font-display);font-size:22px;font-weight:600;margin-top:2px}
.pb-right{text-align:right}
.pamount{font-family:var(--font-display);font-size:24px;font-weight:700;color:#c8973f}
.plabel2{font-size:11px;opacity:.5;margin-top:2px}
.huchas-list{padding:0 20px}
.hucha-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.hc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hc-name{font-family:var(--font-display);font-size:18px;font-weight:600}
.hc-type{font-size:11px;color:var(--sub);margin-top:2px}
.hc-saldo{text-align:right}
.hc-saldo-num{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--gold)}
.hc-saldo-label{font-size:10px;color:var(--sub)}
.hc-progress{margin-bottom:14px}
.hc-bar{height:8px;background:var(--gold-light);border-radius:4px;overflow:hidden}
.hc-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .6s}
.hc-fill.done{background:var(--green)}
.hc-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-top:6px}
.hc-meta .pct{font-weight:600;color:var(--gold)}
.hc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:14px;border-top:1px solid var(--gold-border)}
.hc-stat-label{font-size:10px;color:var(--sub);margin-bottom:2px}
.hc-stat-val{font-size:13px;font-weight:600}
.hc-stat-val.in{color:var(--green)}.hc-stat-val.out{color:var(--red)}.hc-stat-val.neutral{color:var(--sub)}

/* STATES */
.loading-state{text-align:center;padding:60px 20px;color:var(--sub)}
.spinner{width:28px;height:28px;border:2.5px solid var(--gold-border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px;line-height:1.6}

/* DEBUG BANNER */
.debug-banner{background:#fffbe6;border-bottom:1px solid #e6d88a;padding:8px 20px;font-size:11px;color:#6b5900;font-family:monospace;display:none;word-break:break-all}
</style>
</head>
<body>

<div class="debug-banner" id="debugBanner"></div>

<!-- PAGE: REGISTRO -->
<div class="page active" id="page-registro">
    <div class="page-title">Registro</div>
    <div class="page-sub">Envía tus gastos e ingresos por texto</div>
    <div class="input-wrap">
        <input type="text" class="msg-input" id="msgInput" placeholder="Ej: Gasto 25€ taxi al aeropuerto" enterkeyhint="send" autocomplete="off">
    </div>
    <div class="chips">
        <button class="chip" type="button" data-chip="Gasto">Gasto</button>
        <button class="chip" type="button" data-chip="Ingreso">Ingreso</button>
        <button class="chip" type="button" data-chip="Transferencia">Transferencia</button>
    </div>
    <div class="send-wrap">
        <button class="send-btn" id="sendBtn" type="button">Enviar registro</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="section-label" style="padding:24px 24px 10px">Últimos envíos</div>
    <div id="historyList"></div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="page" id="page-dashboard">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Resumen de tus finanzas</div>
    <div class="month-nav">
        <button class="month-btn" id="monthPrev" type="button" aria-label="Mes anterior">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-display" id="monthDisplay"></span>
        <button class="month-btn" id="monthNext" type="button" aria-label="Mes siguiente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>
    <div id="dashboard-content"></div>
</div>

<!-- PAGE: HUCHAS -->
<div class="page" id="page-huchas">
    <div class="page-title">Huchas</div>
    <div class="page-sub">Tus cuentas y objetivos de ahorro</div>
    <div id="huchas-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <button class="nav-btn active" id="nav-registro" data-page="registro" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
        Registro
    </button>
    <button class="nav-btn" id="nav-dashboard" data-page="dashboard" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
        Dashboard
    </button>
    <button class="nav-btn" id="nav-huchas" data-page="huchas" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 5H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2z"/><path d="M16 14a2 2 0 100-4 2 2 0 000 4z"/></svg>
        Huchas
    </button>
</nav>

<script>
(function() {
    'use strict';
    
    /* =========================================================
       CONFIGURACIÓN
       ========================================================= */
    const CONFIG = Object.freeze({
        WEBHOOK: 'https://devegp.app.n8n.cloud/webhook/988ac9dc-924b-4baf-946e-ea6770ceb8d6',
        SHEET_ID: '18cy6FPY0jbiCP0fOBQxEoQGt7wUAcJM_Ffze9yYNYLk',
        API_KEY: 'AIzaSyAPRB7T_g__DGj4BUxABQk1Xn7jPgRckUg',
        MESES: Object.freeze(['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']),
        COLORS: Object.freeze(['#a07838','#2d7a52','#4a7ab5','#8b5e9e','#c07030','#a03030','#2d8a8a','#c8973f']),
        DEBUG: false,
        MAX_INPUT_LENGTH: 500,
        REQUEST_TIMEOUT: 15000,
        MAX_HISTORY_ITEMS: 5,
        STORAGE_KEY: 'finanzas_historial'
    });
    
    /* =========================================================
       ESTADO
       ========================================================= */
    const state = {
        currentDate: new Date(),
        allData: [],
        cuentasData: {},  // Saldos iniciales y objetivos desde Sheets
        chartInstance: null,
        evolInstance: null,
        dashboardStale: true,
        huchasStale: true,
        isLoading: false
    };

    /* =========================================================
       DEBUG
       ========================================================= */
    function dbg(msg) {
        if (!CONFIG.DEBUG) return;
        const el = document.getElementById('debugBanner');
        if (el) { 
            el.style.display = 'block'; 
            el.textContent = String(msg).substring(0, 500); 
        }
        console.log('[DBG]', msg);
    }

    /* =========================================================
       UTILIDADES DE SEGURIDAD
       ========================================================= */
    function escapeHtml(str) {
        if (typeof str !== 'string') return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function sanitizeInput(str) {
        if (typeof str !== 'string') return '';
        return str.trim().substring(0, CONFIG.MAX_INPUT_LENGTH);
    }
    
    function isValidNumber(val) {
        const num = parseFloat(val);
        return !isNaN(num) && isFinite(num);
    }
    
    function parseNumber(val) {
        if (typeof val === 'number') return val;
        if (typeof val !== 'string') return 0;
        // Manejar formato español (coma decimal)
        const cleaned = val.replace(/\s/g, '').replace(',', '.');
        const num = parseFloat(cleaned);
        return isValidNumber(num) ? num : 0;
    }

    /* =========================================================
       NAVEGACIÓN
       ========================================================= */
    function showPage(p) {
        const validPages = ['registro', 'dashboard', 'huchas'];
        if (!validPages.includes(p)) return;
        
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        
        const pageEl = document.getElementById('page-' + p);
        const navEl = document.getElementById('nav-' + p);
        
        if (pageEl) pageEl.classList.add('active');
        if (navEl) navEl.classList.add('active');
        
        if (p === 'dashboard') loadDashboard();
        if (p === 'huchas') loadHuchas();
    }

    /* =========================================================
       HISTORIAL PERSISTENTE (localStorage)
       ========================================================= */
    function loadHistory() {
        try {
            const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
            if (!stored) return [];
            const parsed = JSON.parse(stored);
            if (!Array.isArray(parsed)) return [];
            return parsed.slice(0, CONFIG.MAX_HISTORY_ITEMS);
        } catch (e) {
            dbg('Error loading history: ' + e.message);
            return [];
        }
    }
    
    function saveHistory(history) {
        try {
            const toSave = history.slice(0, CONFIG.MAX_HISTORY_ITEMS);
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(toSave));
        } catch (e) {
            dbg('Error saving history: ' + e.message);
        }
    }
    
    function renderHistory() {
        const list = document.getElementById('historyList');
        if (!list) return;
        
        const history = loadHistory();
        list.innerHTML = '';
        
        if (history.length === 0) {
            list.innerHTML = '<div class="empty-state" style="padding:20px">Sin registros recientes</div>';
            return;
        }
        
        history.forEach(function(item) {
            const el = document.createElement('div');
            el.className = 'history-item';
            
            const textSpan = document.createElement('span');
            textSpan.className = 'hi-text';
            textSpan.textContent = item.text;
            
            const badge = document.createElement('span');
            badge.className = 'hi-badge ' + (item.ok ? 'ok' : 'err');
            badge.textContent = item.ok ? 'OK' : 'Error';
            
            el.appendChild(textSpan);
            el.appendChild(badge);
            list.appendChild(el);
        });
    }
    
    function addToHistory(text, ok) {
        const history = loadHistory();
        // Añadir al principio
        history.unshift({ text: text, ok: ok, time: Date.now() });
        // Mantener solo MAX_HISTORY_ITEMS
        while (history.length > CONFIG.MAX_HISTORY_ITEMS) {
            history.pop();
        }
        saveHistory(history);
        renderHistory();
    }

    /* =========================================================
       REGISTRO
       ========================================================= */
    function insertChip(t, chipEl) {
        const input = document.getElementById('msgInput');
        if (!input) return;
        input.value = t + ' ';
        input.focus();
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if (chipEl) chipEl.classList.add('active');
    }

    async function enviar() {
        const input = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const fb = document.getElementById('feedback');
        
        if (!input || !fb || state.isLoading) return;
        
        const msg = sanitizeInput(input.value);
        if (!msg) return;
        
        state.isLoading = true;
        if (sendBtn) sendBtn.disabled = true;
        fb.className = 'feedback';
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
            
            const res = await fetch(CONFIG.WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ texto: msg }),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (res.ok) {
                fb.className = 'feedback ok';
                fb.innerHTML = '✓ &nbsp;Registrado correctamente';
                addToHistory(msg, true);
                input.value = '';
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                state.dashboardStale = true;
                state.huchasStale = true;
            } else {
                throw new Error('HTTP ' + res.status);
            }
        } catch (err) {
            fb.className = 'feedback err';
            if (err.name === 'AbortError') {
                fb.innerHTML = '✗ &nbsp;Tiempo de espera agotado';
            } else {
                fb.innerHTML = '✗ &nbsp;Error al conectar con N8N';
            }
            addToHistory(msg, false);
            dbg('Error enviar: ' + err.message);
        } finally {
            state.isLoading = false;
            if (sendBtn) sendBtn.disabled = false;
            setTimeout(() => { fb.className = 'feedback'; }, 3000);
        }
    }

    /* =========================================================
       fetchSheet
       ========================================================= */
    async function fetchSheet(range) {
        if (typeof range !== 'string' || !range.match(/^[\w\s]+![A-Z]+:[A-Z]+$/)) {
            throw new Error('Range inválido: ' + range);
        }
        
        const url = 'https://sheets.googleapis.com/v4/spreadsheets/' 
            + CONFIG.SHEET_ID + '/values/' 
            + range.replace(/ /g, '%20') 
            + '?key=' + CONFIG.API_KEY;
        
        dbg('Fetching: ' + url);
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), CONFIG.REQUEST_TIMEOUT);
        
        try {
            const res = await fetch(url, {
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' },
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (!res.ok) {
                let body = '';
                try { body = await res.text(); } catch(e) {}
                throw new Error('HTTP ' + res.status + ' — ' + body.substring(0, 200));
            }
            
            const json = await res.json();
            dbg('fetchSheet OK — ' + ((json.values || []).length) + ' filas');
            return json.values || [];
            
        } catch (err) {
            clearTimeout(timeoutId);
            if (err.name === 'AbortError') {
                throw new Error('Tiempo de espera agotado');
            }
            throw err;
        }
    }

    /* =========================================================
       CARGAR CUENTAS (Saldos iniciales y objetivos desde Sheets)
       Siempre recarga para reflejar cambios manuales en Sheets
       ========================================================= */
    async function loadCuentas() {
        // NO usar caché — siempre recargar para reflejar ajustes manuales
        
        try {
            const rows = await fetchSheet('Cuentas!A:E');
            if (rows.length < 2) return;
            
            // Parsear headers
            const headers = rows[0];
            const cuentaIdx = headers.indexOf('Cuenta');
            const saldoIdx = headers.indexOf('Saldo_Inicial');
            const objetivoIdx = headers.indexOf('Objetivo');
            
            if (cuentaIdx === -1) {
                dbg('No se encontró columna "Cuenta" en hoja Cuentas');
                return;
            }
            
            // Parsear filas
            rows.slice(1).forEach(function(row) {
                const nombre = (row[cuentaIdx] || '').trim();
                if (!nombre) return;
                
                state.cuentasData[nombre] = {
                    saldoInicial: saldoIdx !== -1 ? parseNumber(row[saldoIdx]) : 0,
                    objetivo: objetivoIdx !== -1 ? parseNumber(row[objetivoIdx]) : 0
                };
            });
            
            dbg('Cuentas cargadas: ' + Object.keys(state.cuentasData).join(', '));
            
        } catch (e) {
            dbg('Error cargando Cuentas: ' + e.message);
            // Fallback a valores por defecto si falla
            state.cuentasData = {
                'Principal': { saldoInicial: 0, objetivo: 0 },
                'Fondo Emergencia': { saldoInicial: 0, objetivo: 10000 },
                'Fiscal y Proyectos': { saldoInicial: 0, objetivo: 0 },
                'Hipoteca': { saldoInicial: 0, objetivo: 35000 },
                'Jubilación': { saldoInicial: 0, objetivo: 0 }
            };
        }
    }
    
    function getSaldoInicial(nombre) {
        return state.cuentasData[nombre]?.saldoInicial || 0;
    }
    
    function getObjetivo(nombre) {
        return state.cuentasData[nombre]?.objetivo || 0;
    }

    /* =========================================================
       PARSEO Y UTILIDADES
       ========================================================= */
    function parseRows(rows) {
        if (!Array.isArray(rows) || rows.length < 2) return [];
        
        const headers = rows[0];
        if (!Array.isArray(headers)) return [];
        
        return rows.slice(1).map(function(r) {
            if (!Array.isArray(r)) return null;
            const obj = {};
            headers.forEach(function(k, i) { 
                obj[String(k)] = r[i] !== undefined ? String(r[i]) : ''; 
            });
            return obj;
        }).filter(Boolean);
    }

    function fmt(n) {
        const num = parseFloat(n);
        if (!isValidNumber(num)) return '0,00 €';
        return new Intl.NumberFormat('es-ES', {
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2
        }).format(num) + ' €';
    }
    
    function parseDate(dateStr) {
        if (typeof dateStr !== 'string') return null;
        const parts = dateStr.split('/');
        if (parts.length !== 3) return null;
        const day = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10);
        const year = parseInt(parts[2], 10);
        if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
        return { day, month, year };
    }

    /* =========================================================
       DASHBOARD
       ========================================================= */
    function changeMonth(d) {
        state.currentDate.setMonth(state.currentDate.getMonth() + d);
        renderDashboard();
    }

    function updateMonthLabel() {
        const el = document.getElementById('monthDisplay');
        if (el) {
            el.textContent = CONFIG.MESES[state.currentDate.getMonth()] + ' ' + state.currentDate.getFullYear();
        }
    }

    async function loadDashboard() {
        const content = document.getElementById('dashboard-content');
        if (!content) return;
        
        if (state.allData.length > 0 && !state.dashboardStale) {
            renderDashboard();
            return;
        }
        
        content.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Cargando datos…</span></div>';
        
        try {
            const rows = await fetchSheet('Transacciones!A:J');
            state.allData = parseRows(rows);
            state.dashboardStale = false;
            dbg('Dashboard: ' + state.allData.length + ' transacciones parseadas');
            renderDashboard();
        } catch(e) {
            dbg('loadDashboard error: ' + e.message);
            content.innerHTML = '<div class="empty-state">No se pudieron cargar los datos.<br><br><small style="color:#a07838">' + escapeHtml(e.message) + '</small></div>';
        }
    }

    function filterByYM(data, y, m) {
        return data.filter(function(r) {
            const parsed = parseDate(r.Fecha);
            if (!parsed) return false;
            return parsed.year === y && parsed.month === (m + 1);
        });
    }

    function getMonthData(offsetMonths) {
        const d = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + offsetMonths, 1);
        const rows = filterByYM(state.allData, d.getFullYear(), d.getMonth());
        const gastos = rows.filter(function(r) { return r.Tipo === 'Gasto'; });
        const ingresos = rows.filter(function(r) { return r.Tipo === 'Ingreso'; });
        
        const totalI = ingresos.reduce(function(s, r) { 
            return s + parseNumber(r.Monto); 
        }, 0);
        
        const totalG = gastos.reduce(function(s, r) { 
            return s + parseNumber(r.Monto); 
        }, 0);
        
        const catMap = {};
        gastos.forEach(function(r) {
            const c = r['Categoría'] || r['Categoria'] || 'Otros';
            catMap[c] = (catMap[c] || 0) + parseNumber(r.Monto);
        });
        
        return { 
            totalI: totalI, 
            totalG: totalG, 
            catMap: catMap, 
            label: CONFIG.MESES[d.getMonth()].substring(0, 3) 
        };
    }

    function renderDashboard() {
        const content = document.getElementById('dashboard-content');
        if (!content) return;
        
        try {
            updateMonthLabel();

            const cur = getMonthData(0);
            const prev = getMonthData(-1);
            const balance = cur.totalI - cur.totalG;
            const pct = cur.totalI > 0 ? Math.round(balance / cur.totalI * 100) : 0;
            const bCls = balance > 0 ? 'pos' : balance < 0 ? 'neg' : 'zero';

            const cats = Object.entries(cur.catMap).sort(function(a, b) { return b[1] - a[1]; });
            
            let catsHTML = '';
            cats.forEach(function(item, i) {
                const name = item[0], amt = item[1];
                const p = cur.totalG > 0 ? Math.round(amt / cur.totalG * 100) : 0;
                const color = CONFIG.COLORS[i % CONFIG.COLORS.length];
                catsHTML += '<div class="cat-row"><div class="cat-dot" style="background:' + color + '"></div><span class="cat-name">' + escapeHtml(name) + '</span><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:' + p + '%;background:' + color + '"></div></div><span class="cat-amount">' + fmt(amt) + '</span></div>';
            });

            const allCatKeys = Object.keys(cur.catMap).concat(Object.keys(prev.catMap));
            const uniqueCats = [...new Set(allCatKeys)].sort();
            
            let semaforoHTML = '';
            uniqueCats.forEach(function(name) {
                const actual = cur.catMap[name] || 0;
                const anterior = prev.catMap[name] || 0;
                if (actual === 0 && anterior === 0) return;
                
                const diff = actual - anterior;
                const pctDiff = anterior > 0 ? Math.round(diff / anterior * 100) : 0;
                const cls = diff < 0 ? 'verde' : diff > 0 ? 'rojo' : 'igual';
                const arrow = diff < 0 ? '↓' : diff > 0 ? '↑' : '-';
                const diffTxt = anterior > 0 ? (arrow + ' ' + Math.abs(pctDiff) + '% vs mes ant.') : (anterior === 0 && actual > 0 ? 'Nuevo' : '-');
                
                semaforoHTML += '<div class="semaforo-row"><div class="semaforo-dot ' + cls + '"></div><span class="semaforo-name">' + escapeHtml(name) + '</span><div class="semaforo-vals"><div class="semaforo-actual">' + fmt(actual) + '</div><div class="semaforo-diff ' + cls + '">' + escapeHtml(diffTxt) + '</div></div></div>';
            });

            const m2 = getMonthData(-2);
            const evolLabels = [m2.label, prev.label, cur.label];
            const evolI = [m2.totalI, prev.totalI, cur.totalI];
            const evolG = [m2.totalG, prev.totalG, cur.totalG];

            const mes = filterByYM(state.allData, state.currentDate.getFullYear(), state.currentDate.getMonth());
            const ingresosCount = mes.filter(function(r) { return r.Tipo === 'Ingreso'; }).length;
            const gastosCount = mes.filter(function(r) { return r.Tipo === 'Gasto'; }).length;

            content.innerHTML =
                '<div class="balance-hero">' +
                    '<div class="blabel">Balance del mes</div>' +
                    '<div class="bamount ' + bCls + '">' + fmt(balance) + '</div>' +
                    '<div class="bsub">Ingresos − Gastos</div>' +
                    (cur.totalI > 0 ? '<div class="ahorro-pill">⬆ ' + pct + '% ahorro sobre ingresos</div>' : '') +
                '</div>' +
                '<div class="kpi-row">' +
                    '<div class="kpi-tile in"><div class="kpi-label">Ingresos</div><div class="kpi-val">' + fmt(cur.totalI) + '</div><div class="kpi-count">' + ingresosCount + ' registro' + (ingresosCount !== 1 ? 's' : '') + '</div></div>' +
                    '<div class="kpi-tile out"><div class="kpi-label">Gastos</div><div class="kpi-val">' + fmt(cur.totalG) + '</div><div class="kpi-count">' + gastosCount + ' registro' + (gastosCount !== 1 ? 's' : '') + '</div></div>' +
                '</div>' +
                '<div class="evol-wrap"><div class="evol-title">Evolución 3 meses</div><canvas id="evolChart"></canvas></div>' +
                (cats.length ? '<div class="chart-wrap"><div class="chart-title">Distribución de gastos</div><canvas id="catChart"></canvas></div>' : '') +
                (semaforoHTML ? '<div class="section-label" style="padding:0 24px;margin-bottom:10px">Vs mes anterior</div><div class="semaforo-list">' + semaforoHTML + '</div>' : '') +
                (!cats.length ? '<div class="empty-state">Sin gastos registrados este mes.</div>' : '');

            if (state.evolInstance) { state.evolInstance.destroy(); state.evolInstance = null; }
            if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }

            const evolCanvas = document.getElementById('evolChart');
            if (evolCanvas) {
                state.evolInstance = new Chart(evolCanvas.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: evolLabels,
                        datasets: [
                            { label: 'Ingresos', data: evolI, borderColor: '#2d7a52', backgroundColor: 'rgba(45,122,82,0.08)', borderWidth: 2, pointBackgroundColor: '#2d7a52', pointRadius: 4, tension: 0.3, fill: true },
                            { label: 'Gastos', data: evolG, borderColor: '#a03030', backgroundColor: 'rgba(160,48,48,0.06)', borderWidth: 2, pointBackgroundColor: '#a03030', pointRadius: 4, tension: 0.3, fill: true }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: true, position: 'bottom', labels: {font: {size: 11}, color: '#1a1612', boxWidth: 10, padding: 12} },
                            tooltip: { callbacks: {label: function(c) { return ' ' + fmt(c.raw); }}, backgroundColor: '#1a1612', borderColor: 'rgba(160,120,56,0.3)', borderWidth: 1, titleColor: '#f5f0e8', bodyColor: '#c8973f', padding: 10 }
                        },
                        scales: {
                            x: { grid: {display: false}, ticks: {color: 'rgba(26,22,18,0.4)', font: {size: 11}} },
                            y: { grid: {color: 'rgba(160,120,56,0.08)'}, ticks: { color: 'rgba(26,22,18,0.4)', font: {size: 10}, callback: function(v) { return v === 0 ? '0' : (v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v); } }, beginAtZero: true }
                        }
                    }
                });
            }

            if (cats.length) {
                const catCanvas = document.getElementById('catChart');
                if (catCanvas) {
                    state.chartInstance = new Chart(catCanvas.getContext('2d'), {
                        type: 'doughnut',
                        data: {
                            labels: cats.map(function(c) { return c[0]; }),
                            datasets: [{ data: cats.map(function(c) { return c[1]; }), backgroundColor: cats.map(function(_, i) { return CONFIG.COLORS[i % CONFIG.COLORS.length]; }), borderWidth: 0, hoverOffset: 6 }]
                        },
                        options: {
                            responsive: true,
                            cutout: '70%',
                            plugins: {
                                legend: {display: false},
                                tooltip: { callbacks: {label: function(c) { return ' ' + fmt(c.raw); }}, backgroundColor: '#1a1612', borderColor: 'rgba(160,120,56,0.3)', borderWidth: 1, titleColor: '#f5f0e8', bodyColor: '#c8973f', padding: 10 }
                            }
                        }
                    });
                }
            }

            dbg('renderDashboard OK');

        } catch(e) {
            dbg('renderDashboard error: ' + (e.message || e));
            content.innerHTML = '<div class="empty-state">Error al renderizar el dashboard.<br><small>' + escapeHtml(e.message || '') + '</small></div>';
        }
    }

    /* =========================================================
       HUCHAS
       ========================================================= */
    async function loadHuchas() {
        const content = document.getElementById('huchas-content');
        if (!content) return;
        
        content.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Calculando saldos…</span></div>';
        
        try {
            // Cargar cuentas primero (saldos iniciales y objetivos)
            await loadCuentas();
            
            // Cargar transacciones
            const rows = await fetchSheet('Transacciones!A:J');
            const data = parseRows(rows);
            
            state.allData = data;
            state.huchasStale = false;
            state.dashboardStale = false;
            
            dbg('Huchas: ' + data.length + ' transacciones');
            renderHuchas(data);
        } catch(e) {
            dbg('loadHuchas error: ' + e.message);
            content.innerHTML = '<div class="empty-state">No se pudieron cargar los datos.<br><small>' + escapeHtml(e.message) + '</small></div>';
        }
    }

    function calcSaldo(nombre, data) {
        let s = getSaldoInicial(nombre);
        
        data.forEach(function(r) {
            const monto = parseNumber(r.Monto);
            if (monto === 0) return;
            
            const tipo = r.Tipo || '';
            const origen = (r['Cuenta_Origen'] || r['CuentaOrigen'] || '').trim();
            const destino = (r['Cuenta_Destino'] || r['CuentaDestino'] || '').trim();
            
            switch(tipo) {
                case 'Ingreso':
                    // Ingresos sin destino van a Principal
                    if (destino === nombre || (nombre === 'Principal' && !destino)) {
                        s += monto;
                    }
                    break;
                    
                case 'Gasto':
                    // Gastos sin origen salen de Principal
                    if (origen === nombre || (nombre === 'Principal' && !origen)) {
                        s -= monto;
                    }
                    break;
                    
                case 'Transferencia':
                    if (destino === nombre) s += monto;
                    if (origen === nombre) s -= monto;
                    break;
                    
                case 'Valoracion':
                case 'Valoración':
                    if (destino === nombre) s = monto;
                    break;
                    
                case 'Ajuste':
                    // Ajuste positivo: destino tiene la cuenta, suma
                    // Ajuste negativo: origen tiene la cuenta, resta
                    if (destino === nombre) s += monto;
                    if (origen === nombre) s -= monto;
                    break;
            }
        });
        
        return s;
    }

    function calcMov(nombre, data) {
        let entradas = 0, salidas = 0;
        
        data.forEach(function(r) {
            const monto = parseNumber(r.Monto);
            if (monto === 0) return;
            
            if (r.Tipo === 'Transferencia') {
                const destino = (r['Cuenta_Destino'] || r['CuentaDestino'] || '').trim();
                const origen = (r['Cuenta_Origen'] || r['CuentaOrigen'] || '').trim();
                
                if (destino === nombre) entradas += monto;
                if (origen === nombre) salidas += monto;
            }
        });
        
        return { entradas, salidas };
    }

    function renderHuchas(data) {
        const content = document.getElementById('huchas-content');
        if (!content) return;
        
        const sp = calcSaldo('Principal', data);
        
        // Obtener lista de huchas desde cuentasData (excluir Principal)
        const huchas = Object.keys(state.cuentasData).filter(function(n) {
            return n !== 'Principal';
        });
        
        // Si no hay cuentas cargadas, usar lista por defecto
        const huchasList = huchas.length > 0 ? huchas : ['Fondo Emergencia', 'Fiscal y Proyectos', 'Hipoteca', 'Jubilación'];
        
        let html = '<div class="principal-banner"><div class="pb-left"><div class="plabel">Cuenta corriente</div><div class="pname">Principal</div></div><div class="pb-right"><div class="pamount">' + fmt(sp) + '</div><div class="plabel2">Saldo actual</div></div></div><div class="huchas-list">';
        
        huchasList.forEach(function(nombre) {
            const saldo = calcSaldo(nombre, data);
            const obj = getObjetivo(nombre);
            const mov = calcMov(nombre, data);
            const pct = obj > 0 ? Math.min(100, Math.round(saldo / obj * 100)) : 0;
            const done = obj > 0 && saldo >= obj;
            const inicial = getSaldoInicial(nombre);
            
            html += '<div class="hucha-card">';
            html += '<div class="hc-top"><div><div class="hc-name">' + escapeHtml(nombre) + '</div><div class="hc-type">Hucha · CaixaBank</div></div><div class="hc-saldo"><div class="hc-saldo-num">' + fmt(saldo) + '</div><div class="hc-saldo-label">Saldo actual</div></div></div>';
            
            if (obj > 0) {
                html += '<div class="hc-progress"><div class="hc-bar"><div class="hc-fill ' + (done ? 'done' : '') + '" style="width:' + pct + '%"></div></div><div class="hc-meta"><span class="pct">' + pct + '%</span><span>de ' + fmt(obj) + '</span></div></div>';
            } else {
                html += '<div class="hc-meta" style="margin-bottom:14px"><span>Sin objetivo definido</span></div>';
            }
            
            html += '<div class="hc-stats">';
            html += '<div class="hc-stat"><div class="hc-stat-label">Aportado</div><div class="hc-stat-val in">+' + fmt(mov.entradas) + '</div></div>';
            html += '<div class="hc-stat"><div class="hc-stat-label">Retirado</div><div class="hc-stat-val out">−' + fmt(mov.salidas) + '</div></div>';
            html += '<div class="hc-stat"><div class="hc-stat-label">Inicial</div><div class="hc-stat-val neutral">' + fmt(inicial) + '</div></div>';
            html += '</div></div>';
        });
        
        html += '</div>';
        content.innerHTML = html;
    }

    /* =========================================================
       EVENT LISTENERS
       ========================================================= */
    function initEventListeners() {
        document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                if (page) showPage(page);
            });
        });
        
        document.querySelectorAll('.chip[data-chip]').forEach(function(chip) {
            chip.addEventListener('click', function() {
                const value = this.getAttribute('data-chip');
                if (value) insertChip(value, this);
            });
        });
        
        const sendBtn = document.getElementById('sendBtn');
        if (sendBtn) {
            sendBtn.addEventListener('click', enviar);
        }
        
        const msgInput = document.getElementById('msgInput');
        if (msgInput) {
            msgInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    enviar();
                }
            });
        }
        
        const monthPrev = document.getElementById('monthPrev');
        const monthNext = document.getElementById('monthNext');
        if (monthPrev) monthPrev.addEventListener('click', function() { changeMonth(-1); });
        if (monthNext) monthNext.addEventListener('click', function() { changeMonth(1); });
    }

    /* =========================================================
       INIT
       ========================================================= */
    function init() {
        updateMonthLabel();
        initEventListeners();
        renderHistory(); // Cargar historial desde localStorage
        dbg('App inicializada');
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
})();
</script>
