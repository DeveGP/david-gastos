<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finanzas · David</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:         #f5f0e8;
    --bg2:        #ede8de;
    --bg3:        #e4ddd0;
    --bg4:        #faf7f2;
    --ink:        #1a1612;
    --ink-dim:    rgba(26,22,18,0.52);
    --ink-faint:  rgba(26,22,18,0.28);
    --gold:       #a07838;
    --gold2:      #c8973f;
    --gold-light: #e8c97a;
    --gold-dim:   rgba(160,120,56,0.10);
    --gold-mid:   rgba(160,120,56,0.22);
    --green:      #2d7a52;
    --green-dim:  rgba(45,122,82,0.10);
    --red:        #a03030;
    --red-dim:    rgba(160,48,48,0.10);
    --border:     rgba(160,120,56,0.15);
    --border-hi:  rgba(160,120,56,0.30);
    --shadow:     0 2px 16px rgba(26,22,18,0.08);
    --shadow-lg:  0 8px 32px rgba(26,22,18,0.12);
    --radius:     16px;
    --radius-sm:  10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

  .nav { position:fixed; bottom:0; left:0; right:0; background:rgba(245,240,232,0.96); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -4px 20px rgba(26,22,18,0.06); }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:12px 8px; background:none; border:none; color:var(--ink-faint); font-family:'DM Sans',sans-serif; font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:color .2s; position:relative; }
  .nav-btn.active { color:var(--gold); }
  .nav-btn.active::before { content:''; position:absolute; top:0; left:30%; right:30%; height:2px; background:var(--gold); border-radius:0 0 3px 3px; }
  .nav-btn svg { width:20px; height:20px; }

  .page { display:none; min-height:100vh; padding-bottom:90px; }
  .page.active { display:block; animation:pageIn .2s ease; }
  @keyframes pageIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .page-header { padding:56px 24px 24px; }
  .eyebrow { font-size:9px; letter-spacing:.25em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:8px; }
  .page-header h1 { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:600; color:var(--ink); line-height:1.05; letter-spacing:-.01em; }
  .page-header p { color:var(--ink-faint); font-size:13px; margin-top:5px; font-weight:300; }
  .rule { height:1px; background:var(--border); margin:0 24px; }

  .chips { padding:20px 24px 0; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:8px 16px; border-radius:30px; border:1px solid var(--border); background:var(--bg4); color:var(--ink-dim); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:400; cursor:pointer; transition:all .15s; box-shadow:var(--shadow); }
  .chip.active { background:var(--gold); border-color:var(--gold); color:#fff; box-shadow:0 4px 12px rgba(160,120,56,.25); }

  .input-area { padding:16px 24px 0; }
  .textarea-wrap { background:var(--bg4); border:1.5px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); transition:border-color .2s,box-shadow .2s; }
  .textarea-wrap:focus-within { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim),var(--shadow); }
  .main-input { width:100%; background:transparent; border:none; padding:18px 20px 14px; color:var(--ink); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; resize:none; min-height:88px; line-height:1.6; font-weight:300; }
  .main-input::placeholder { color:var(--ink-faint); font-style:italic; font-size:14px; }
  .send-btn { width:100%; margin-top:10px; padding:17px; background:var(--gold); border:none; border-radius:var(--radius); color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; transition:all .15s; box-shadow:0 4px 16px rgba(160,120,56,.3); }
  .send-btn:active { background:var(--gold2); transform:scale(.99); }

  .feedback { margin:10px 0 0; padding:13px 16px; border-radius:var(--radius-sm); font-size:13px; display:none; align-items:center; gap:8px; }
  .feedback.ok { background:var(--green-dim); color:var(--green); border:1px solid rgba(45,122,82,.2); display:flex; }
  .feedback.err { background:var(--red-dim); color:var(--red); border:1px solid rgba(160,48,48,.2); display:flex; }

  .history-section { padding:28px 24px 0; }
  .section-label { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:12px; font-weight:600; }
  .history-list { display:flex; flex-direction:column; gap:6px; }
  .history-item { background:var(--bg4); border-radius:var(--radius-sm); padding:13px 16px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border); box-shadow:var(--shadow); }
  .hi-text { font-size:13px; color:var(--ink-dim); font-weight:300; }
  .hi-badge { font-size:9px; padding:3px 9px; border-radius:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .hi-badge.ok { background:var(--green-dim); color:var(--green); }
  .hi-badge.err { background:var(--red-dim); color:var(--red); }

  .month-nav-wrap { padding:0 24px 24px; display:flex; align-items:center; gap:12px; }
  .month-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border); background:var(--bg4); color:var(--gold); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); transition:all .15s; }
  .month-btn:active { background:var(--gold-dim); border-color:var(--gold); }
  .month-display { flex:1; text-align:center; font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:500; color:var(--ink); }

  .balance-hero { margin:0 24px 20px; background:var(--ink); border-radius:var(--radius); padding:28px 24px; position:relative; overflow:hidden; box-shadow:var(--shadow-lg); }
  .balance-hero::after { content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,rgba(200,151,63,.15) 0%,transparent 70%); pointer-events:none; }
  .balance-hero .blabel { font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-light); opacity:.7; margin-bottom:8px; font-weight:600; }
  .balance-hero .bamount { font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:600; line-height:1; letter-spacing:-.02em; }
  .bamount.pos { color:#7ecfa0; }
  .bamount.neg { color:#e07070; }
  .bamount.zero { color:#f5f0e8; }
  .balance-hero .bsub { font-size:12px; color:rgba(245,240,232,.4); margin-top:8px; font-weight:300; }
  .ahorro-pill { display:inline-flex; align-items:center; gap:5px; margin-top:14px; padding:5px 12px; background:rgba(200,151,63,.15); border:1px solid rgba(200,151,63,.3); border-radius:20px; font-size:12px; color:var(--gold-light); font-weight:500; }

  .kpi-row { margin:0 24px 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .kpi-tile { background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius); padding:18px 16px; box-shadow:var(--shadow); }
  .kpi-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px; font-weight:600; }
  .kpi-val { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; line-height:1; }
  .kpi-tile.in .kpi-val { color:var(--green); }
  .kpi-tile.out .kpi-val { color:var(--red); }
  .kpi-count { font-size:11px; color:var(--ink-faint); margin-top:5px; font-weight:300; }

  .chart-wrap { margin:0 24px 10px; background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius); padding:22px 20px 18px; box-shadow:var(--shadow); }
  .chart-title { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:18px; font-weight:600; }
  .chart-wrap canvas { max-height:200px; }

  .cat-list { margin:0 24px 20px; display:flex; flex-direction:column; gap:6px; }
  .cat-row { display:flex; align-items:center; gap:12px; padding:13px 16px; background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow); }
  .cat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .cat-name { flex:1; font-size:13px; color:var(--ink-dim); font-weight:300; }
  .cat-bar-wrap { width:50px; height:2px; background:var(--border); border-radius:1px; overflow:hidden; }
  .cat-bar-fill { height:100%; border-radius:1px; }
  .cat-amount { font-size:13px; font-weight:500; color:var(--ink); min-width:72px; text-align:right; }

  .loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:70px 20px; gap:14px; color:var(--ink-faint); font-size:13px; font-weight:300; font-style:italic; }
  .spinner { width:24px; height:24px; border:1.5px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .9s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty-state { text-align:center; padding:50px 24px; color:var(--ink-faint); font-size:13px; font-weight:300; font-style:italic; line-height:1.7; }

  .refresh-btn { display:flex; align-items:center; gap:6px; margin:0 24px 20px; padding:9px 14px; background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--ink-dim); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:all .15s; width:fit-content; box-shadow:var(--shadow); }
  .refresh-btn:active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }

  .principal-banner { margin:0 24px 16px; background:var(--ink); border-radius:var(--radius); padding:22px; display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow-lg); position:relative; overflow:hidden; }
  .principal-banner::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(200,151,63,.08) 0%,transparent 60%); pointer-events:none; }
  .pb-left .plabel { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold-light); opacity:.7; margin-bottom:6px; font-weight:600; }
  .pb-left .pname { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:#f5f0e8; }
  .pb-right { text-align:right; }
  .pb-right .pamount { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:700; color:var(--gold-light); line-height:1; }
  .pb-right .plabel2 { font-size:10px; color:rgba(245,240,232,.4); margin-top:3px; font-weight:300; }

  .huchas-list { padding:0 24px; display:flex; flex-direction:column; gap:12px; }
  .hucha-card { background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
  .hucha-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--gold-light)); }
  .hc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; }
  .hc-name { font-family:'Cormorant Garamond',serif; font-size:21px; font-weight:600; color:var(--ink); }
  .hc-type { font-size:10px; color:var(--ink-faint); margin-top:3px; font-weight:300; }
  .hc-saldo { text-align:right; }
  .hc-saldo-num { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:700; color:var(--gold); line-height:1; }
  .hc-saldo-label { font-size:10px; color:var(--ink-faint); margin-top:3px; }
  .hc-progress { margin-bottom:14px; }
  .hc-bar { height:4px; background:var(--bg3); border-radius:2px; overflow:hidden; margin-bottom:7px; }
  .hc-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; transition:width .7s ease; }
  .hc-fill.done { background:linear-gradient(90deg,var(--green),#7ecfa0); }
  .hc-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--ink-faint); font-weight:300; }
  .hc-meta .pct { color:var(--gold); font-weight:600; }
  .hc-stats { display:flex; border-top:1px solid var(--border); padding-top:14px; }
  .hc-stat { flex:1; border-right:1px solid var(--border); padding-right:12px; margin-right:12px; }
  .hc-stat:last-child { border-right:none; padding-right:0; margin-right:0; }
  .hc-stat-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:5px; font-weight:600; }
  .hc-stat-val { font-size:13px; font-weight:500; }
  .hc-stat-val.in { color:var(--green); }
  .hc-stat-val.out { color:var(--red); }
  .hc-stat-val.neutral { color:var(--ink-dim); }

  /* EVOLUCIÓN Y SEMÁFORO */
  .evol-wrap { margin:0 24px 18px; background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius); padding:20px 18px 16px; box-shadow:var(--shadow); }
  .evol-title { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:16px; font-weight:600; }
  .evol-wrap canvas { max-height:160px; }

  .semaforo-list { margin:0 24px 20px; display:flex; flex-direction:column; gap:6px; }
  .semaforo-row { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius-sm); box-shadow:var(--shadow); }
  .semaforo-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .semaforo-dot.verde { background:var(--green); }
  .semaforo-dot.rojo { background:var(--red); }
  .semaforo-dot.igual { background:var(--gold); }
  .semaforo-name { flex:1; font-size:13px; color:var(--ink-dim); font-weight:300; }
  .semaforo-vals { text-align:right; }
  .semaforo-actual { font-size:13px; font-weight:500; color:var(--ink); }
  .semaforo-diff { font-size:10px; margin-top:1px; }
  .semaforo-diff.verde { color:var(--green); }
  .semaforo-diff.rojo { color:var(--red); }
  .semaforo-diff.igual { color:var(--gold); }
</style>
</head>
<body>

<!-- REGISTRO -->
<div id="page-registro" class="page active">
  <div class="page-header">
    <div class="eyebrow">Finanzas Personales</div>
    <h1>Registrar<br>movimiento</h1>
  </div>
  <div class="rule"></div>
  <div class="chips">
    <button class="chip" onclick="insertChip('Super')">Super</button>
    <button class="chip" onclick="insertChip('Restaurante')">Restaurante</button>
    <button class="chip" onclick="insertChip('Take Away')">Take Away</button>
    <button class="chip" onclick="insertChip('Gastos varios')">Gastos varios</button>
    <button class="chip" onclick="insertChip('Ocio')">Ocio</button>
    <button class="chip" onclick="insertChip('Taxi')">Taxi</button>
    <button class="chip" onclick="insertChip('Otro')">Otro</button>
  </div>
  <div class="input-area">
    <div class="textarea-wrap">
      <textarea class="main-input" id="msgInput" placeholder="Super 47 EUR · Taxi 21€ · Hucha Hipoteca +500 EUR" rows="3"></textarea>
    </div>
    <button class="send-btn" onclick="enviar()">Registrar</button>
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="history-section">
    <div class="section-label">Esta sesión</div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page">
  <div class="page-header">
    <div class="eyebrow">Resumen mensual</div>
    <h1>Dashboard</h1>
  </div>
  <div class="month-nav-wrap">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-display" id="monthDisplay">—</div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div id="dashboard-content">
    <div class="loading-state"><div class="spinner"></div><span>Cargando datos…</span></div>
  </div>
</div>

<!-- HUCHAS -->
<div id="page-huchas" class="page">
  <div class="page-header">
    <div class="eyebrow">Cuentas de ahorro</div>
    <h1>Huchas</h1>
  </div>
  <button class="refresh-btn" onclick="loadHuchas()">
    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
    Actualizar
  </button>
  <div id="huchas-content">
    <div class="loading-state"><div class="spinner"></div><span>Calculando saldos…</span></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-registro" onclick="showPage('registro')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
    Registrar
  </button>
  <button class="nav-btn" id="nav-dashboard" onclick="showPage('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/></svg>
    Dashboard
  </button>
  <button class="nav-btn" id="nav-huchas" onclick="showPage('huchas')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 12c0 4.4-3.6 8-8 8s-8-3.6-8-8 3.6-8 8-8c2 0 3.9.7 5.3 2"/><path d="M20 4v4h-4"/><path d="M12 8v4l3 3"/></svg>
    Huchas
  </button>
</nav>

<script>
const WEBHOOK='https://devegp.app.n8n.cloud/webhook/988ac9dc-924b-4baf-946e-ea6770ceb8d6';
const SHEET_ID='18cy6FPY0jbiCP0fOBQxEoQGt7wUAcJM_Ffze9yYNYLk';
const API_KEY='AIzaSyAPRB7T_g__DGj4BUxABQk1Xn7jPgRckUg';
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SALDO_INICIAL={'Principal':608.54,'Fondo Emergencia':10252.73,'Fiscal y Proyectos':4447.78,'Hipoteca':0,'Jubilación':0};
const OBJETIVO={'Fondo Emergencia':10000,'Hipoteca':35000};
const COLORS=['#a07838','#2d7a52','#4a7ab5','#8b5e9e','#c07030','#a03030','#2d8a8a','#c8973f'];
function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='dashboard')loadDashboard();
  if(p==='huchas')loadHuchas();
}

function insertChip(t){
  document.getElementById('msgInput').value=t+' ';
  document.getElementById('msgInput').focus();
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
}

async function enviar(){
  const input=document.getElementById('msgInput');
  const msg=input.value.trim();
  const fb=document.getElementById('feedback');
  if(!msg)return;
  fb.className='feedback';
  try{
    const res=await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texto:msg})});
    if(res.ok){fb.className='feedback ok';fb.innerHTML='✓ &nbsp;Registrado correctamente';addHistory(msg,true);input.value='';document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));}
    else throw new Error();
  }catch{fb.className='feedback err';fb.innerHTML='✗ &nbsp;Error al conectar con N8N';addHistory(msg,false);}
  setTimeout(()=>{fb.className='feedback';},3000);
}

function addHistory(text,ok){
  const el=document.createElement('div');el.className='history-item';
  el.innerHTML=`<span class="hi-text">${text}</span><span class="hi-badge ${ok?'ok':'err'}">${ok?'OK':'Error'}</span>`;
  document.getElementById('historyList').prepend(el);
}

document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar();}});

async function fetchSheet(range){
  const ts=Date.now();
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}&_t=${ts}`;
  const res=await fetch(url,{cache:'no-store'});
  if(!res.ok)throw new Error();
  return(await res.json()).values||[];
}
function parseRows(rows){if(!rows.length)return[];const h=rows[0];return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,r[i]||''])));}
function fmt(n){return new Intl.NumberFormat('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n)+' €';}

let currentDate=new Date(),allData=[],loaded=false;

function changeMonth(d){currentDate.setMonth(currentDate.getMonth()+d);renderDashboard();}
function updateMonthLabel(){document.getElementById('monthDisplay').textContent=MESES[currentDate.getMonth()]+' '+currentDate.getFullYear();}

async function loadDashboard(){
  
  document.getElementById('dashboard-content').innerHTML=`<div class="loading-state"><div class="spinner"></div><span>Cargando datos…</span></div>`;
  try{allData=parseRows(await fetchSheet('Transacciones!A:J'));renderDashboard();}
  catch{document.getElementById('dashboard-content').innerHTML=`<div class="empty-state">No se pudieron cargar los datos.<br>Comprueba la API Key y la conexión.</div>`;}
}

function filterMonth(data){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  return data.filter(r=>{const p=(r.Fecha||'').split('/');return p.length===3&&parseInt(p[2])===y&&parseInt(p[1])===m+1;});
}

// Helpers para filtrar por mes/año arbitrario
function filterByYM(data, y, m){
  return data.filter(r=>{const p=(r.Fecha||'').split('/');return p.length===3&&parseInt(p[2])===y&&parseInt(p[1])===m+1;});
}

function getMonthData(offsetMonths){
  const d=new Date(currentDate.getFullYear(), currentDate.getMonth()+offsetMonths, 1);
  const rows=filterByYM(allData, d.getFullYear(), d.getMonth());
  const gastos=rows.filter(r=>r.Tipo==='Gasto');
  const ingresos=rows.filter(r=>r.Tipo==='Ingreso');
  const totalI=ingresos.reduce((s,r)=>s+(parseFloat(r.Monto)||0),0);
  const totalG=gastos.reduce((s,r)=>s+(parseFloat(r.Monto)||0),0);
  const catMap={};
  gastos.forEach(r=>{const c=r['Categoría']||r['Categoria']||'Otros';catMap[c]=(catMap[c]||0)+(parseFloat(r.Monto)||0);});
  return{totalI,totalG,catMap,label:MESES[d.getMonth()].substring(0,3)};
}

let chartInstance=null, evolInstance=null;

function renderDashboard(){
  updateMonthLabel();
  if(!allData.length)return;

  // Mes actual
  const cur=getMonthData(0);
  const prev=getMonthData(-1);
  const balance=cur.totalI-cur.totalG;
  const pct=cur.totalI>0?Math.round(balance/cur.totalI*100):0;
  const bCls=balance>0?'pos':balance<0?'neg':'zero';

  // Categorías mes actual
  const cats=Object.entries(cur.catMap).sort((a,b)=>b[1]-a[1]);
  let catsHTML='';
  cats.forEach(([name,amt],i)=>{
    const p=cur.totalG>0?Math.round(amt/cur.totalG*100):0;
    catsHTML+=`<div class="cat-row"><div class="cat-dot" style="background:${COLORS[i%COLORS.length]}"></div><span class="cat-name">${name}</span><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${p}%;background:${COLORS[i%COLORS.length]}"></div></div><span class="cat-amount">${fmt(amt)}</span></div>`;
  });

  // Semáforo vs mes anterior
  const allCats=[...new Set([...Object.keys(cur.catMap),...Object.keys(prev.catMap)])].sort();
  let semaforoHTML='';
  allCats.forEach(name=>{
    const actual=cur.catMap[name]||0;
    const anterior=prev.catMap[name]||0;
    if(actual===0&&anterior===0)return;
    const diff=actual-anterior;
    const pctDiff=anterior>0?Math.round(diff/anterior*100):0;
    const cls=diff<0?'verde':diff>0?'rojo':'igual';
    const arrow=diff<0?'↓':diff>0?'↑':'-';
    const diffTxt=anterior>0?`${arrow} ${Math.abs(pctDiff)}% vs mes ant.`:(anterior===0?'Nuevo':'-');
    semaforoHTML+=`<div class="semaforo-row"><div class="semaforo-dot ${cls}"></div><span class="semaforo-name">${name}</span><div class="semaforo-vals"><div class="semaforo-actual">${fmt(actual)}</div><div class="semaforo-diff ${cls}">${diffTxt}</div></div></div>`;
  });

  // Datos evolución 3 meses
  const m2=getMonthData(-2);
  const evolLabels=[m2.label, prev.label, cur.label];
  const evolI=[m2.totalI, prev.totalI, cur.totalI];
  const evolG=[m2.totalG, prev.totalG, cur.totalG];

  const mes=filterByYM(allData, currentDate.getFullYear(), currentDate.getMonth());
  const ingresosCount=mes.filter(r=>r.Tipo==='Ingreso').length;
  const gastosCount=mes.filter(r=>r.Tipo==='Gasto').length;

  document.getElementById('dashboard-content').innerHTML=`
    <div class="balance-hero">
      <div class="blabel">Balance del mes</div>
      <div class="bamount ${bCls}">${fmt(balance)}</div>
      <div class="bsub">Ingresos − Gastos</div>
      ${cur.totalI>0?`<div class="ahorro-pill">⬆ ${pct}% ahorro sobre ingresos</div>`:''}
    </div>
    <div class="kpi-row">
      <div class="kpi-tile in"><div class="kpi-label">Ingresos</div><div class="kpi-val">${fmt(cur.totalI)}</div><div class="kpi-count">${ingresosCount} registro${ingresosCount!==1?'s':''}</div></div>
      <div class="kpi-tile out"><div class="kpi-label">Gastos</div><div class="kpi-val">${fmt(cur.totalG)}</div><div class="kpi-count">${gastosCount} registro${gastosCount!==1?'s':''}</div></div>
    </div>
    <div class="evol-wrap">
      <div class="evol-title">Evolución 3 meses</div>
      <canvas id="evolChart"></canvas>
    </div>
    ${cats.length?`<div class="chart-wrap"><div class="chart-title">Distribución de gastos</div><canvas id="catChart"></canvas></div>`:''}
    ${semaforoHTML?`<div class="section-label" style="padding:0 24px;margin-bottom:10px">Vs mes anterior</div><div class="semaforo-list">${semaforoHTML}</div>`:''}
    ${!cats.length?`<div class="empty-state">Sin gastos registrados este mes.</div>`:''}
  `;

  // Gráfico evolución
  if(evolInstance){evolInstance.destroy();evolInstance=null;}
  evolInstance=new Chart(document.getElementById('evolChart').getContext('2d'),{
    type:'line',
    data:{
      labels:evolLabels,
      datasets:[
        {label:'Ingresos',data:evolI,borderColor:'#2d7a52',backgroundColor:'rgba(45,122,82,0.08)',borderWidth:2,pointBackgroundColor:'#2d7a52',pointRadius:4,tension:0.3,fill:true},
        {label:'Gastos',data:evolG,borderColor:'#a03030',backgroundColor:'rgba(160,48,48,0.06)',borderWidth:2,pointBackgroundColor:'#a03030',pointRadius:4,tension:0.3,fill:true}
      ]
    },
    options:{responsive:true,plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},color:'#1a1612',boxWidth:10,padding:12}},tooltip:{callbacks:{label:c=>` ${fmt(c.raw)}`},backgroundColor:'#1a1612',borderColor:'rgba(160,120,56,0.3)',borderWidth:1,titleColor:'#f5f0e8',bodyColor:'#c8973f',padding:10}},scales:{x:{grid:{display:false},ticks:{color:'rgba(26,22,18,0.4)',font:{size:11}}},y:{grid:{color:'rgba(160,120,56,0.08)'},ticks:{color:'rgba(26,22,18,0.4)',font:{size:10},callback:v=>v===0?'0':(v>=1000?(v/1000).toFixed(0)+'k':v)}}}}
  });

  // Gráfico donut
  if(cats.length){
    if(chartInstance){chartInstance.destroy();chartInstance=null;}
    chartInstance=new Chart(document.getElementById('catChart').getContext('2d'),{type:'doughnut',data:{labels:cats.map(c=>c[0]),datasets:[{data:cats.map(c=>c[1]),backgroundColor:cats.map((_,i)=>COLORS[i%COLORS.length]),borderWidth:0,hoverOffset:6}]},options:{responsive:true,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.raw)}`},backgroundColor:'#1a1612',borderColor:'rgba(160,120,56,0.3)',borderWidth:1,titleColor:'#f5f0e8',bodyColor:'#c8973f',padding:10}}}});
  }
}

async function loadHuchas(){
  document.getElementById('huchas-content').innerHTML=`<div class="loading-state"><div class="spinner"></div><span>Calculando saldos…</span></div>`;
  try{renderHuchas(parseRows(await fetchSheet('Transacciones!A:J')));}
  catch{document.getElementById('huchas-content').innerHTML=`<div class="empty-state">No se pudieron cargar los datos.</div>`;}
}

function calcSaldo(nombre,data){
  let s=SALDO_INICIAL[nombre]||0;
  data.forEach(r=>{const m=parseFloat(r.Monto)||0,t=r.Tipo,o=r['Cuenta_Origen']||'',d=r['Cuenta_Destino']||'';if(t==='Ingreso'&&d===nombre)s+=m;if(t==='Gasto'&&o===nombre)s-=m;if(t==='Transferencia'){if(d===nombre)s+=m;if(o===nombre)s-=m;}if(t==='Valoracion'&&d===nombre)s=m;});
  return s;
}

function calcMov(nombre,data){
  let e=0,s=0;
  data.forEach(r=>{const m=parseFloat(r.Monto)||0;if(r.Tipo==='Transferencia'){if(r['Cuenta_Destino']===nombre)e+=m;if(r['Cuenta_Origen']===nombre)s+=m;}});
  return{entradas:e,salidas:s};
}

function renderHuchas(data){
  const sp=calcSaldo('Principal',data);
  const huchas=['Fondo Emergencia','Fiscal y Proyectos','Hipoteca','Jubilación'];
  let html=`<div class="principal-banner"><div class="pb-left"><div class="plabel">Cuenta corriente</div><div class="pname">Principal</div></div><div class="pb-right"><div class="pamount">${fmt(sp)}</div><div class="plabel2">Saldo actual</div></div></div><div class="huchas-list">`;
  huchas.forEach(nombre=>{
    const saldo=calcSaldo(nombre,data),obj=OBJETIVO[nombre]||0,mov=calcMov(nombre,data);
    const pct=obj>0?Math.min(100,Math.round(saldo/obj*100)):0,done=obj>0&&saldo>=obj;
    html+=`<div class="hucha-card"><div class="hc-top"><div><div class="hc-name">${nombre}</div><div class="hc-type">Hucha · CaixaBank</div></div><div class="hc-saldo"><div class="hc-saldo-num">${fmt(saldo)}</div><div class="hc-saldo-label">Saldo actual</div></div></div>${obj>0?`<div class="hc-progress"><div class="hc-bar"><div class="hc-fill ${done?'done':''}" style="width:${pct}%"></div></div><div class="hc-meta"><span class="pct">${pct}%</span><span>de ${fmt(obj)}</span></div></div>`:`<div class="hc-meta" style="margin-bottom:14px"><span>Sin objetivo definido</span></div>`}<div class="hc-stats"><div class="hc-stat"><div class="hc-stat-label">Aportado</div><div class="hc-stat-val in">+${fmt(mov.entradas)}</div></div><div class="hc-stat"><div class="hc-stat-label">Retirado</div><div class="hc-stat-val out">−${fmt(mov.salidas)}</div></div><div class="hc-stat"><div class="hc-stat-label">Inicial</div><div class="hc-stat-val neutral">${fmt(SALDO_INICIAL[nombre]||0)}</div></div></div></div>`;
  });
  html+='</div>';
  document.getElementById('huchas-content').innerHTML=html;
}

updateMonthLabel();
</script>
